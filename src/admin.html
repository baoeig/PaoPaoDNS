<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaoPaoDNS 管理面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1923;--card:#1a2733;--border:#2a3a4a;--primary:#4fc3f7;--primary-dark:#0288d1;--text:#e0e0e0;--text-dim:#8899aa;--success:#66bb6a;--danger:#ef5350;--warn:#ffa726;--hover:#243444}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;font-weight:600;color:var(--primary)}
.header .status-dots{display:flex;gap:12px}
.status-dot{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-dim)}
.status-dot .dot{width:8px;height:8px;border-radius:50%;background:var(--danger)}
.status-dot .dot.on{background:var(--success)}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;gap:0}
.tab{padding:12px 20px;cursor:pointer;color:var(--text-dim);border-bottom:2px solid transparent;font-size:14px;transition:all .2s}
.tab:hover{color:var(--text);background:var(--hover)}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.content{max-width:1200px;margin:0 auto;padding:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px}
.card-title{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--primary);display:flex;align-items:center;justify-content:space-between}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-info{flex:1}
.setting-info .label{font-size:14px;font-weight:500}
.setting-info .desc{font-size:12px;color:var(--text-dim);margin-top:2px}
.setting-value{font-size:13px;color:var(--primary);font-family:monospace}
select{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:6px 12px;font-size:13px;cursor:pointer}
select:focus{outline:none;border-color:var(--primary)}
.btn{padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s}
.btn-primary{background:var(--primary-dark);color:#fff}
.btn-primary:hover{background:var(--primary)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{opacity:.85}
.btn-sm{padding:4px 10px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.input-group{display:flex;gap:8px;margin-bottom:12px}
input[type=text]{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:8px 12px;font-size:13px;flex:1;font-family:monospace}
input[type=text]:focus{outline:none;border-color:var(--primary)}
input[type=text]::placeholder{color:var(--text-dim)}
.domain-list{max-height:400px;overflow-y:auto}
.domain-item{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-radius:4px;font-family:monospace;font-size:13px}
.domain-item:hover{background:var(--hover)}
.domain-item.added{background:rgba(79,195,247,.14);outline:1px solid rgba(79,195,247,.35)}
.domain-item .del-btn{color:var(--danger);cursor:pointer;opacity:.45;padding:2px 6px;transition:opacity .2s}
.domain-item:hover .del-btn{opacity:1}
.list-tabs{display:flex;gap:0;margin-bottom:16px;flex-wrap:wrap}
.list-tab{padding:8px 14px;cursor:pointer;font-size:13px;color:var(--text-dim);border:1px solid var(--border);background:var(--bg);transition:all .2s}
.list-tab:first-child{border-radius:4px 0 0 4px}
.list-tab:last-child{border-radius:0 4px 4px 0}
.list-tab.active{color:var(--primary);border-color:var(--primary);background:var(--card)}
.domain-help{margin:-4px 0 14px;padding:10px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text-dim);font-size:12px;line-height:1.6}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.stat-box{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:14px;text-align:center}
.stat-box .val{font-size:22px;font-weight:700;color:var(--primary);font-family:monospace}
.stat-box .lbl{font-size:11px;color:var(--text-dim);margin-top:4px;text-transform:uppercase}
.cache-entry{padding:10px 0;border-bottom:1px solid var(--border)}
.cache-entry:last-child{border-bottom:none}
.cache-main{display:flex;align-items:center;justify-content:space-between;gap:12px;font-family:monospace;font-size:13px}
.cache-domain{color:var(--primary);font-weight:600;word-break:break-all}
.cache-meta{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;color:var(--text-dim);font-family:monospace;font-size:11px}
.cache-source{display:inline-flex;align-items:center;padding:1px 6px;border:1px solid rgba(79,195,247,.35);border-radius:999px;color:var(--primary);font-family:inherit;font-size:11px}
.cache-answer{margin-top:6px;color:var(--text);font-family:monospace;font-size:12px;word-break:break-all}
.cache-key{margin-top:6px;color:var(--text-dim);font-family:monospace;font-size:10px;word-break:break-all}
.log-table{width:100%;border-collapse:collapse;font-size:12px}
.log-table th{text-align:left;padding:8px;color:var(--text-dim);border-bottom:1px solid var(--border);font-weight:500;position:sticky;top:0;background:var(--card)}
.log-table td{padding:6px 8px;border-bottom:1px solid var(--border);font-family:monospace;word-break:break-all}
.log-table tr:hover{background:var(--hover)}
.log-scroll{max-height:500px;overflow-y:auto}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:6px;font-size:13px;z-index:1000;transition:all .3s;opacity:0;transform:translateY(-10px)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--success);color:#fff}
.toast.error{background:var(--danger);color:#fff}
.hidden{display:none!important}
.badge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:11px;font-family:monospace}
.badge-cn{background:#2e7d3220;color:var(--success);border:1px solid #2e7d3240}
.badge-nocn{background:#e6530020;color:var(--danger);border:1px solid #e6530040}
.reload-bar{background:var(--card);border:1px solid var(--warn);border-radius:8px;padding:12px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.reload-bar .msg{color:var(--warn);font-size:13px}
.prefix-select{background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px 0 0 4px;padding:8px 8px;font-size:13px;border-right:none}
.prefix-input{border-radius:0 4px 4px 0 !important}
@media(max-width:768px){
.header{padding:12px 16px}.content{padding:12px}
.stat-grid{grid-template-columns:repeat(2,1fr)}
.list-tabs{gap:0}.setting-row{flex-wrap:wrap;gap:8px}
}
</style>
</head>
<body>
<div class="header">
  <h1>PaoPaoDNS</h1>
  <div class="status-dots" id="statusDots"></div>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('config')">分流设置</div>
  <div class="tab" onclick="switchTab('domains')">域名管理</div>
  <div class="tab" onclick="switchTab('cache')">DNS 缓存</div>
  <div class="tab" onclick="switchTab('log')">查询日志</div>
</div>

<div class="content">
<!-- Config Tab -->
<div id="tab-config">
  <div id="reloadBar" class="reload-bar hidden">
    <span class="msg">配置已修改，需要重载 mosdns 生效</span>
    <button class="btn btn-primary" onclick="reloadMosdns()">应用并重载</button>
  </div>
  <div class="card">
    <div class="card-title">可修改设置</div>
    <div id="toggleSettings"></div>
  </div>
  <div class="card">
    <div class="card-title">只读设置 (需重启容器修改)</div>
    <div id="readonlySettings"></div>
  </div>
</div>

<!-- Domains Tab -->
<div id="tab-domains" class="hidden">
  <div class="card">
    <div class="list-tabs" id="listTabs"></div>
    <div class="domain-help" id="domainHelp"></div>
    <div class="input-group">
      <select class="prefix-select" id="domainPrefix">
        <option value="domain:">domain:</option>
        <option value="full:">full:</option>
        <option value="keyword:">keyword:</option>
        <option value="regexp:">regexp:</option>
      </select>
      <input type="text" id="domainInput" class="prefix-input" placeholder="输入域名，如 example.com">
      <button class="btn btn-primary" onclick="addDomain()">添加</button>
    </div>
    <div class="domain-list" id="domainList"></div>
  </div>
</div>

<!-- Cache Tab -->
<div id="tab-cache" class="hidden">
  <div class="stat-grid" id="cacheStats"></div>
  <div class="card">
    <div class="card-title">
      <span>缓存记录</span>
      <button class="btn btn-danger btn-sm" onclick="flushCache()">清空缓存</button>
    </div>
    <div class="input-group">
      <input type="text" id="cacheSearch" placeholder="搜索域名 / IP / 缓存键..." oninput="searchCacheDebounced()">
      <button class="btn btn-primary" onclick="loadCacheKeys()">搜索</button>
    </div>
    <div id="cacheKeys" style="max-height:400px;overflow-y:auto"></div>
    <div style="margin-top:8px;text-align:center">
      <button class="btn btn-sm" id="loadMoreBtn" onclick="loadMoreCache()" style="display:none">加载更多</button>
    </div>
  </div>
</div>

<!-- Log Tab -->
<div id="tab-log" class="hidden">
  <div class="card">
    <div class="card-title">
      <span>DNS 查询日志</span>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="logUsage" style="color:var(--text-dim);font-size:12px"></span>
        <input type="text" id="logSearch" placeholder="搜索域名..." style="width:200px" oninput="loadQueryLogDebounced()">
        <button class="btn btn-primary btn-sm" onclick="loadQueryLog()">刷新</button>
        <button class="btn btn-danger btn-sm" onclick="clearQueryLog()">清空日志</button>
      </div>
    </div>
    <div class="log-scroll">
      <table class="log-table">
        <thead><tr><th>时间</th><th>域名</th><th>类型</th><th>解析路径</th><th>解析结果</th><th>详情</th></tr></thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';
let currentTab = 'config';
let currentList = 'force_dnscrypt';
let savedSettings = {};
let pendingChanges = {};
let cacheCursor = 0;
let searchTimer = null;

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    const tabs = ['config','domains','cache','log'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  ['config','domains','cache','log'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('hidden', t !== tab);
  });
  if (tab === 'config') loadConfig();
  if (tab === 'domains') loadDomains();
  if (tab === 'cache') { loadCacheStats(); loadCacheKeys(); }
  if (tab === 'log') loadQueryLog();
}

function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.className = 'toast', 3000);
}

async function api(path, opts={}) {
  try {
    const resp = await fetch(API + path, {
      headers: {'Content-Type':'application/json'},
      ...opts,
    });
    return await resp.json();
  } catch(e) {
    toast('请求失败: ' + e.message, 'error');
    return null;
  }
}

// Status
async function loadStatus() {
  const data = await api('/api/status');
  if (!data) return;
  const el = document.getElementById('statusDots');
  el.innerHTML = Object.entries(data).map(([k,v]) =>
    `<span class="status-dot"><span class="dot ${v?'on':''}"></span>${k}</span>`
  ).join('');
}

// Config
async function loadConfig() {
  const data = await api('/api/config');
  if (!data) return;
  savedSettings = {};
  data.settings.forEach(s => { savedSettings[s.key] = s.current; });
  (data.text_settings || []).forEach(s => { savedSettings[s.key] = s.current; });
  const toggleEl = document.getElementById('toggleSettings');
  const selectHtml = data.settings.map(s => `
    <div class="setting-row">
      <div class="setting-info">
        <div class="label">${s.label} <code style="color:var(--text-dim);font-size:11px">${s.key}</code></div>
        <div class="desc">${s.desc}</div>
      </div>
      <select onchange="onSettingChange('${s.key}',this.value)" data-key="${s.key}">
        ${s.values.map(v => `<option value="${v}" ${v===(pendingChanges[s.key] ?? s.current)?'selected':''}>${v}</option>`).join('')}
      </select>
    </div>
  `).join('');
  const textHtml = (data.text_settings || []).map(s => `
    <div class="setting-row">
      <div class="setting-info">
        <div class="label">${s.label} <code style="color:var(--text-dim);font-size:11px">${s.key}</code></div>
        <div class="desc">${s.desc}</div>
      </div>
      <input type="text" value="${escHtml(pendingChanges[s.key] ?? s.current)}" placeholder="${escHtml(s.placeholder || '')}" oninput="onSettingChange('${s.key}',this.value.trim())" data-key="${s.key}" style="max-width:260px">
    </div>
  `).join('');
  toggleEl.innerHTML = selectHtml + textHtml;

  const roEl = document.getElementById('readonlySettings');
  roEl.innerHTML = data.readonly.map(s => `
    <div class="setting-row">
      <div class="setting-info">
        <div class="label">${s.label || s.key} <code style="color:var(--text-dim);font-size:11px">${s.key}</code></div>
        <div class="desc">${s.desc || ''}</div>
      </div>
      <span class="setting-value">${s.current}</span>
    </div>
  `).join('');
  reconcilePendingChanges();
}

function onSettingChange(key, val) {
  if (savedSettings[key] === val) {
    delete pendingChanges[key];
  } else {
    pendingChanges[key] = val;
  }
  updateReloadBar();
}

function reconcilePendingChanges() {
  Object.keys(pendingChanges).forEach(key => {
    if (savedSettings[key] === pendingChanges[key]) {
      delete pendingChanges[key];
    }
  });
  updateReloadBar();
}

function updateReloadBar() {
  document.getElementById('reloadBar').classList.toggle('hidden', Object.keys(pendingChanges).length === 0);
}

async function reloadMosdns() {
  if (Object.keys(pendingChanges).length > 0) {
    const res = await api('/api/config', {
      method: 'POST',
      body: JSON.stringify({settings: pendingChanges}),
    });
    if (!res || res.error) {
      toast('保存配置失败', 'error');
      return;
    }
  }
  toast('正在重载 mosdns...');
  const res = await api('/api/reload', {method:'POST'});
  if (res && res.ok) {
    toast('重载成功');
    pendingChanges = {};
    updateReloadBar();
    loadConfig();
    loadStatus();
  } else {
    toast('重载失败: ' + (res?.stderr || res?.error || ''), 'error');
  }
}

// Domains
async function loadDomains(highlightDomain='') {
  const data = await api('/api/domains/all');
  if (!data) return;
  const tabsEl = document.getElementById('listTabs');
  tabsEl.innerHTML = Object.entries(data).map(([k,v]) =>
    `<div class="list-tab ${k===currentList?'active':''}" onclick="switchList('${k}')">${v.label} (${v.domains.length})</div>`
  ).join('');
  const current = data[currentList] || {};
  document.getElementById('domainHelp').textContent = current.desc || '';
  renderDomainList(current.domains || [], highlightDomain);
}

function switchList(lt) {
  currentList = lt;
  loadDomains();
}

function renderDomainList(domains, highlightDomain='') {
  const el = document.getElementById('domainList');
  if (domains.length === 0) {
    el.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:20px">列表为空</div>';
    return;
  }
  el.innerHTML = domains.map(d => `
    <div class="domain-item ${d===highlightDomain?'added':''}" data-domain="${escHtml(d)}">
      <span>${escHtml(d)}</span>
      <span class="del-btn" onclick="deleteDomain('${escAttr(d)}')" title="删除">✕</span>
    </div>
  `).join('');
  if (highlightDomain) {
    const item = Array.from(el.querySelectorAll('.domain-item')).find(node => node.dataset.domain === highlightDomain);
    if (item) item.scrollIntoView({block:'center'});
  }
}

async function addDomain() {
  const prefix = document.getElementById('domainPrefix').value;
  const input = document.getElementById('domainInput');
  const raw = input.value.trim();
  if (!raw) return;
  const domain = prefix + raw;
  const res = await api(`/api/domains/${currentList}`, {
    method: 'POST',
    body: JSON.stringify({domain}),
  });
  if (res && res.ok) {
    toast('已添加: ' + domain);
    input.value = '';
    loadDomains(domain);
  } else {
    toast(res?.error || '添加失败', 'error');
  }
}

async function deleteDomain(domain) {
  const res = await api(`/api/domains/${currentList}`, {
    method: 'DELETE',
    body: JSON.stringify({domain}),
  });
  if (res && res.ok) {
    toast('已删除');
    loadDomains();
  } else {
    toast(res?.error || '删除失败', 'error');
  }
}

// Cache
async function loadCacheStats() {
  const data = await api('/api/cache/stats');
  if (!data || data.error) {
    document.getElementById('cacheStats').innerHTML = '<div class="stat-box"><div class="val">N/A</div><div class="lbl">Redis 不可用</div></div>';
    return;
  }
  const hits = data.keyspace_hits || 0;
  const misses = data.keyspace_misses || 0;
  const total = hits + misses;
  const hitRate = total > 0 ? ((hits/total)*100).toFixed(1) : '0.0';
  const dbStats = (data.dbs || []).map(db =>
    `<div class="stat-box"><div class="val">${escHtml(String(db.size || 0))}</div><div class="lbl">${escHtml(db.source || `DB${db.db}`)}</div></div>`
  ).join('');
  document.getElementById('cacheStats').innerHTML = `
    <div class="stat-box"><div class="val">${data.db_size}</div><div class="lbl">缓存记录数</div></div>
    ${dbStats}
    <div class="stat-box"><div class="val">${data.used_memory_human}</div><div class="lbl">内存使用</div></div>
    <div class="stat-box"><div class="val">${data.maxmemory_human}</div><div class="lbl">最大内存</div></div>
    <div class="stat-box"><div class="val">${hitRate}%</div><div class="lbl">命中率</div></div>
    <div class="stat-box"><div class="val">${formatNum(hits)}</div><div class="lbl">命中次数</div></div>
    <div class="stat-box"><div class="val">${data.evicted_keys}</div><div class="lbl">淘汰数</div></div>
  `;
}

async function loadCacheKeys() {
  cacheCursor = 0;
  document.getElementById('cacheKeys').innerHTML = '';
  await loadMoreCache();
}

async function loadMoreCache() {
  const pattern = document.getElementById('cacheSearch').value.trim() || '*';
  const data = await api(`/api/cache/keys?pattern=${encodeURIComponent(pattern)}&cursor=${cacheCursor}&count=50`);
  if (!data || data.error) return;
  const el = document.getElementById('cacheKeys');
  if (cacheCursor === 0) el.innerHTML = '';
  if (data.keys.length === 0 && cacheCursor === 0) {
    el.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:20px">暂无缓存记录</div>';
  } else {
    el.innerHTML += data.keys.map(renderCacheEntry).join('');
  }
  cacheCursor = data.cursor;
  document.getElementById('loadMoreBtn').style.display = data.has_more ? '' : 'none';
}

function renderCacheEntry(item) {
  if (typeof item === 'string') {
    return `<div class="cache-entry"><div class="cache-key">${escHtml(item)}</div></div>`;
  }
  const answers = (item.answers || []).slice(0, 4).map(a =>
    `${escHtml(a.name)} ${escHtml(a.type)} ${escHtml(String(a.ttl))} ${escHtml(a.data)}`
  ).join('<br>');
  const more = (item.answers || []).length > 4 ? `<br><span style="color:var(--text-dim)">+${item.answers.length - 4} 条</span>` : '';
  const domain = item.domain || item.key;
  const redisTtl = item.redis_ttl === -1 ? '持久' : (item.redis_ttl >= 0 ? `${item.redis_ttl}s` : '未知');
  return `
    <div class="cache-entry">
      <div class="cache-main">
        <div class="cache-domain">${escHtml(domain)}</div>
        <div class="cache-meta">
          <span class="cache-source">${escHtml(item.source || (item.db === null || item.db === undefined ? 'Redis' : `DB${item.db}`))}</span>
          <span>${escHtml(item.qtype || '-')}</span>
          <span>${escHtml(item.rcode || '-')}</span>
          <span>${escHtml(String(item.answer_count || 0))} 条</span>
          <span>TTL ${escHtml(item.ttl_min === null || item.ttl_min === undefined ? '-' : String(item.ttl_min))}</span>
          <span>${escHtml(String(item.size || 0))} B</span>
          <span>Redis ${escHtml(redisTtl)}</span>
        </div>
      </div>
      ${answers ? `<div class="cache-answer">${answers}${more}</div>` : ''}
      <div class="cache-key">${escHtml(item.key || '')}</div>
    </div>
  `;
}

function searchCacheDebounced() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadCacheKeys, 500);
}

async function flushCache() {
  if (!confirm('确定要清空所有 DNS 缓存吗？')) return;
  const res = await api('/api/cache/flush', {method:'DELETE'});
  if (res && res.ok) {
    toast('缓存已清空');
    loadCacheStats();
    loadCacheKeys();
  } else {
    toast('清空失败', 'error');
  }
}

// Query Log
async function loadQueryLog() {
  const search = document.getElementById('logSearch').value.trim();
  const data = await api(`/api/query-log?lines=200&search=${encodeURIComponent(search)}`);
  if (!data) return;
  const log = data.log || {};
  const sizeMb = ((log.size || 0) / 1048576).toFixed(2);
  const maxMb = ((log.max_size || 0) / 1048576).toFixed(0);
  document.getElementById('logUsage').textContent = `${sizeMb} / ${maxMb} MB · ${log.clean_interval || 0}s`;
  const el = document.getElementById('logBody');
  if (data.entries.length === 0) {
    el.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-dim);padding:20px">暂无日志</td></tr>';
    return;
  }
  el.innerHTML = data.entries.map(e => `
    <tr>
      <td style="white-space:nowrap">${escHtml(formatTime(e.time))}</td>
      <td style="color:var(--primary)">${escHtml(e.domain)}</td>
      <td>${escHtml(e.qtype)}</td>
      <td>${escHtml(e.route_label || e.route || '-')}</td>
      <td style="max-width:240px;white-space:normal;word-break:break-all" title="${escAttr(e.answer_source ? `${e.answer_source}: ${e.answers_text || '-'}` : (e.answers_text || ''))}">${escHtml(e.answers_text || '-').replace(/, /g, '<br>')}</td>
      <td style="color:var(--text-dim);max-width:300px;overflow:hidden;text-overflow:ellipsis">${escHtml(e.message)}</td>
    </tr>
  `).join('');
}

async function clearQueryLog() {
  if (!confirm('确定要清空所有 DNS 查询日志吗？')) return;
  const res = await api('/api/query-log', {method:'DELETE'});
  if (res && res.ok) {
    toast('查询日志已清空');
    loadQueryLog();
  } else {
    toast('清空日志失败', 'error');
  }
}

function loadQueryLogDebounced() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadQueryLog, 500);
}

// Utils
function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return s.replace(/'/g,"\\'").replace(/"/g,'\\"');
}
function formatNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return n;
}
function formatTime(t) {
  if (!t) return '';
  try {
    const d = new Date(t);
    return d.toLocaleTimeString('zh-CN', {hour12:false}) + '.' + String(d.getMilliseconds()).padStart(3,'0');
  } catch(e) { return t; }
}

// Init
document.getElementById('domainInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addDomain();
});
loadStatus();
loadConfig();
setInterval(loadStatus, 30000);
</script>
